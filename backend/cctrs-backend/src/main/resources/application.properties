spring.application.name=cctrs-backend

# ===============================
# ACTIVE PROFILE — ALWAYS PROD
# Override only via SPRING_PROFILES_ACTIVE env var (e.g. "test" during CI)
# ===============================
spring.profiles.active=prod

# ===============================
# DATABASE — SUPABASE POOLER (hard-coded)
# Correct Supabase pooler host: aws-1-ap-south-1.pooler.supabase.com:6543
# ===============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool — fail fast if DB unreachable at startup
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=10000

# ===============================
# SQL INITIALIZATION — always run schema.sql on startup
# All statements use CREATE TABLE IF NOT EXISTS — safe and idempotent
# ===============================
spring.sql.init.mode=always

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===============================
# H2 CONSOLE — PERMANENTLY DISABLED
# ===============================
spring.h2.console.enabled=false

# ===============================
# SERVER
# ===============================
server.port=${PORT:8080}

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.cctrs.backend=DEBUG
logging.level.org.springframework=INFO

# ===============================
# MAIL
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# ERROR DETAILS
# ===============================
server.error.include-message=always
server.error.include-binding-errors=always

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile